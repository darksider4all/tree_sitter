<div x-data="{ installing: false, depsInstalled: false, depsError: '' }">
    <template x-if="config">
        <div class="plugin-settings-cards">
            <section class="card plugin-card" x-show="!depsInstalled">
                <h3>Dependencies</h3>
                <p>Tree-sitter requires the <code>tree-sitter-language-pack</code> Python package.</p>
                <div class="actions">
                    <button class="btn btn-primary" :disabled="installing"
                        @click="
                            installing = true; depsError = '';
                            const { callJsonApi } = await import('/js/api.js');
                            try {
                                await callJsonApi('/plugins/tree_sitter/install_deps', {});
                                depsInstalled = true;
                            } catch (e) { depsError = e.message || String(e); }
                            finally { installing = false; }
                        ">
                        <span x-show="!installing">Install Dependencies</span>
                        <span x-show="installing">Installing...</span>
                    </button>
                </div>
                <p class="error-text" x-show="depsError" x-text="depsError"></p>
            </section>
            <section class="card plugin-card" x-show="depsInstalled">
                <h3>Dependencies</h3>
                <p>tree-sitter-language-pack installed successfully.</p>
            </section>

            <section class="card plugin-card">
                <h3>Inspection Limits</h3>

                <label class="field">
                    <span>Max file bytes</span>
                    <input type="number" min="1000" step="1000"
                        x-model.number="config.max_file_bytes" />
                </label>

                <label class="field">
                    <span>Max chunk chars</span>
                    <input type="number" min="200" step="100"
                        x-model.number="config.max_chunk_chars" />
                </label>

                <label class="field">
                    <span>Max tree depth</span>
                    <input type="number" min="1" step="1"
                        x-model.number="config.max_tree_depth" />
                </label>

                <label class="field">
                    <span>Max query matches</span>
                    <input type="number" min="1" step="1"
                        x-model.number="config.max_query_matches" />
                </label>
            </section>

            <section class="card plugin-card">
                <h3>Indexing</h3>

                <label class="field">
                    <span>Max indexed files</span>
                    <input type="number" min="1" step="1"
                        x-model.number="config.index_max_files" />
                </label>

                <label class="field toggle-field">
                    <label class="toggle">
                        <input type="checkbox"
                            x-model="config.index_hidden_files" />
                        <span class="toggler"></span>
                    </label>
                    <span>Index hidden files</span>
                </label>

                <button class="btn btn-primary"
                    @click="openModal('/plugins/tree_sitter/webui/tree-sitter-inspector.html')">
                    Open Tree-sitter Inspector
                </button>
            </section>
        </div>

        <style>
            .plugin-settings-cards {
                display: grid;
                gap: 1rem;
            }
            .plugin-card {
                display: grid;
                gap: 0.75rem;
            }
            .field {
                display: grid;
                gap: 0.35rem;
            }
            .checkbox-field {
                grid-template-columns: auto 1fr;
                align-items: center;
            }
            .actions {
                display: flex;
                gap: 0.75rem;
            }
            .error-text {
                color: var(--color-error, #e74c3c);
                margin: 0;
            }
        </style>
    </template>
</div>
